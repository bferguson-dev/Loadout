name: Manifest Update

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  update:
    name: Check versions and validate IDs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install jsonpath-ng jsonschema

      - name: Check versions and validate IDs
        id: check
        run: python .github/scripts/check-manifest-versions.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate updated manifest
        if: steps.check.outputs.manifest_changed == 'true'
        run: |
          RUN_GITLEAKS=0 RUN_GIT_SECRETS_CACHED=0 ./check.sh

      - name: Commit updated manifest
        if: steps.check.outputs.manifest_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore: update manifest versions [automated]"
          git push
