name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history so we can push the version.json commit back to main
          fetch-depth: 0

      - name: Parse version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "zip=Loadout-${TAG}.zip" >> "$GITHUB_OUTPUT"

      - name: Update version.json
        id: update_version
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          RELEASE_URL="https://github.com/${REPO}/releases/download/${TAG}/Loadout-${TAG}.zip"

          python - <<EOF
          import json
          with open("version.json") as f:
              v = json.load(f)
          v["version"] = "$VERSION"
          v["releaseUrl"] = "$RELEASE_URL"
          with open("version.json", "w") as f:
              json.dump(v, f, indent=2)
              f.write("\n")
          print(f"Updated version.json: {v}")
          EOF

      - name: Build release zip
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ZIP="${{ steps.version.outputs.zip }}"
          zip -r "${ZIP}" \
            src/ \
            manifest.json \
            version.json \
            bootstrap.ps1 \
            -x "*.git*" -x "*/.gitkeep"
          echo "Created ${ZIP} ($(du -h ${ZIP} | cut -f1))"

      - name: Validate manifest before release
        run: |
          pip install jsonschema
          chmod +x ./check.sh
          RUN_GITLEAKS=0 RUN_GIT_SECRETS_CACHED=0 ./check.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ZIP="${{ steps.version.outputs.zip }}"
          gh release create "${TAG}" \
            --title "Loadout ${TAG}" \
            --generate-notes \
            "${ZIP}#Loadout ${TAG}"

      - name: Commit version.json to main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          WORKTREE="../release-main-worktree"
          git worktree add "${WORKTREE}" origin/main

          cp version.json "${WORKTREE}/version.json"
          cd "${WORKTREE}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git diff --cached --quiet && echo "No version.json change needed" || \
            git commit -m "chore: bump version.json for ${{ steps.version.outputs.tag }}"
          git push origin HEAD:main
          cd -
          git worktree remove "${WORKTREE}" --force
